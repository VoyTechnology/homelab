extraObjects:
  ##############################################################################
  # Exposed Gateway
  # 
  # Exposed gateway is assigned an IP address which is then port-forwarded
  ##############################################################################
  exposedEnvoyProxy:
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyProxy
    metadata:
      name: envoy-exposed
      namespace: envoy-gateway-system
    spec:
      provider:
        type: Kubernetes
        kubernetes:
          envoyService:
            type: LoadBalancer
            annotations:
              metallb.io/address-pool: homelab-ip-pool
  exposedGatewayClass:
    apiVersion: gateway.networking.k8s.io/v1
    kind: GatewayClass
    metadata:
      name: envoy-exposed
    spec:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
      parametersRef:
        group: gateway.envoyproxy.io
        kind: EnvoyProxy
        name: envoy-exposed
        namespace: envoy-gateway-system
  exposedGatewayCert:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: exposed-wildcard-tls
      annotations:
        cert-manager.io/issuer: letsencrypt
    spec:
      commonName: "*.{{ .Values.domain }}"
      dnsNames:
        - "*.{{ .Values.domain }}"
      secretName: exposed-wildcard-tls
      issuerRef:
        name: letsencrypt
        kind: ClusterIssuer
  exposedGateway:
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: exposed
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
    spec:
      gatewayClassName: envoy-exposed
      allowedListeners:
        namespaces:
          from: All
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
        - name: https
          protocol: HTTPS
          hostname: "*.{{ .Values.domain }}"
          port: 443
          tls:
            mode: Terminate
            certificateRefs:
              - group: ''	
                name: internal-wildcard-tls
                kind: Secret
          allowedRoutes:
            namespaces:
              from: All

  ##############################################################################
  # Internal Gateway
  #
  # Internal Gateway is available on the local network, but not accessible
  # outside.
  ##############################################################################
  internalEnvoyProxy:
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyProxy
    metadata:
      name: envoy-internal
      namespace: envoy-gateway-system
    spec:
      provider:
        type: Kubernetes
        kubernetes:
          envoyService:
            type: LoadBalancer
            annotations:
              metallb.io/address-pool: homelab-ip-pool
  internalGatewayClass:
    apiVersion: gateway.networking.k8s.io/v1
    kind: GatewayClass
    metadata:
      name: envoy-internal
    spec:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
      parametersRef:
        group: gateway.envoyproxy.io
        kind: EnvoyProxy
        name: envoy-internal
        namespace: envoy-gateway-system
  internalGatewayCert:
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: internal-wildcard-tls
      annotations:
        cert-manager.io/issuer: letsencrypt
    spec:
      commonName: "*.{{ .Values.domain }}"
      dnsNames:
        - "*.{{ .Values.domain }}"
      secretName: internal-wildcard-tls
      issuerRef:
        name: letsencrypt
        kind: ClusterIssuer
  internalGateway:
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: internal
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
    spec:
      gatewayClassName: envoy-internal
      allowedListeners:
        namespaces:
          from: All
      listeners:
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
        - name: https
          protocol: HTTPS
          hostname: "*.{{ .Values.domain }}"
          port: 443
          tls:
            mode: Terminate
            certificateRefs:
              - group: ''	
                name: internal-wildcard-tls
                kind: Secret
          allowedRoutes:
            namespaces:
              from: All
