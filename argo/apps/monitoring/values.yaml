domain: REPLACE_ME
cluster_name: REPLACE_ME

####################################################################################################
# Grafana
####################################################################################################
grafana:
  enabled: true
  grafana.ini:
    auth.generic_oauth:
      enabled: true
      name: "Dex"
      scopes: openid email profile groups offline_access
      auth_url: "https://login.{{ .Values.domain }}/oauth2/auth"
      token_url: "https://login.{{ .Values.domain }}/oauth2/token"
      api_url: "https://login.{{ .Values.domain }}/oauth2/userinfo"
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-cloud
        key: oauth-client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-cloud
        key: oauth-client-secret
  route:
    main:
      enabled: true
      parentRefs:
        - kind: Gateway
          namespace: envoy-gateway-system
          name: exposed
      hostnames:
        - grafana.{{ .Values.domain }}
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  datasources:
    datasources.yaml: |
      apiVersion: 1
      datasources:
        - name: Metrics
          type: prometheus
          url: http://metrics-mimir-gateway.metrics-system.svc.cluster.local./prometheus
          access: proxy
          isDefault: true

####################################################################################################
# Alloy
####################################################################################################

alloy:
  enabled: true
  controller:
    type: statefulset # Needed for clustering
    replicas: 1
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    ingressClassName: internal-shared
    faroPort: 12345 # Fake faro so we have access to the UI
    extraPaths:
      - path: /faro
        pathType: Prefix
        backend:
          service:
            name: monitoring-alloy
            port:
              number: 12347
  # Add environment variables for remote config
  extraEnvs:
    - name: REMOTE_CONFIG_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: remote-config-url
    - name: TOKEN
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: token
    - name: PROMETHEUS_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: metrics-url
    - name: LOKI_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: loki-url
    - name: GRAFANA_USER
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: user
    - name: LOKI_USER
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: loki-user
  alloy:
    clustering:
      enabled: false
    stabilityLevel: experimental
    configMap:
      content: |
        logging {
          level = "info"
          format = "json"
        }

        livedebugging {
          enabled = true
        }

        // Minimal local config - everything else managed remotely
        discovery.kubernetes "node" {
          role = "node"
        }


        // Minimal local config - everything else managed remotely
        // This ensures the agent can start and receive remote config
        discovery.kubernetes "node" {
          role = "node"
        }

####################################################################################################
# Node Exporter
####################################################################################################

prometheus-node-exporter:
  enabled: true
  prometheus:
    monitor:
      enabled: true
