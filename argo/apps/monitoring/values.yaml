domain: REPLACE_ME
cluster_name: REPLACE_ME

####################################################################################################
# Grafana
####################################################################################################
grafana:
  enabled: true
  grafana.ini:
    server:
      root_url: "https://grafana.{{ .Values.domain }}/"
    auth.generic_oauth:
      enabled: true
      name: "Dex"
      scopes: openid email profile groups offline_access
      skip_org_role_sync: true
      allow_sign_up: false
      oauth_allow_insecure_email_lookup: true
      auth_url: "https://login.{{ .Values.domain }}/auth"
      token_url: "https://login.{{ .Values.domain }}/token"
      api_url: "https://login.{{ .Values.domain }}/userinfo"
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-cloud
        key: oauth-client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-cloud
        key: oauth-client-secret
  route:
    main:
      enabled: true
      parentRefs:
        - kind: Gateway
          namespace: envoy-gateway-system
          name: exposed
      hostnames:
        - grafana.{{ .Values.domain }}
  persistence:
    enabled: true
    storageClassName: longhorn
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Metrics
          type: prometheus
          url: http://query-frontend.metrics-system.svc.cluster.local:8080/prometheus
          access: proxy
          isDefault: true

####################################################################################################
# Alloy
####################################################################################################

alloy:
  enabled: true
  controller:
    type: statefulset # Needed for clustering
    replicas: 1
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    ingressClassName: internal-shared
    faroPort: 12345 # Fake faro so we have access to the UI
    extraPaths:
      - path: /faro
        pathType: Prefix
        backend:
          service:
            name: monitoring-alloy
            port:
              number: 12347
  # Environment variables available to the Alloy config
  extraEnvs:
    - name: GRAFANA_USER
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: user
    - name: LOKI_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: logs-url
    - name: LOKI_USER
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: loki-user
    - name: PROMETHEUS_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: metrics-url
    - name: REMOTE_CONFIG_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: remote-config-url
    - name: TOKEN
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: token
  alloy:
    clustering:
      enabled: false
    stabilityLevel: experimental
    configMap:
      content: |
        logging {
          level = "info"
          format = "json"
        }

        livedebugging {
          enabled = true
        }

        // Discover nodes for kubelet and cadvisor scraping
        discovery.kubernetes "nodes" {
          role = "node"
        }

        // Discover pods with prometheus.io annotations
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Relabel node internal IP to kubelet address
        discovery.relabel "kubelet" {
          targets = discovery.kubernetes.nodes.targets
          rule {
            source_labels = ["__meta_kubernetes_node_internal_ip"]
            target_label  = "__address__"
            replacement   = "$1:10250"
          }
        }

        // Relabel node internal IP for cadvisor
        discovery.relabel "cadvisor" {
          targets = discovery.kubernetes.nodes.targets
          rule {
            source_labels = ["__meta_kubernetes_node_internal_ip"]
            target_label  = "__address__"
            replacement   = "$1:10250"
          }
        }

        // Filter and relabel pods with prometheus.io/scrape=true
        discovery.relabel "pod_annotations" {
          targets = discovery.kubernetes.pods.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
            action = "keep"
            regex = "true"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
            action = "replace"
            target_label = "__metrics_path__"
            regex = "(.+)"
            replacement = "$1"
          }
          rule {
            source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
            action = "replace"
            regex = "([^:]+)(?::\\d+)?;(\\d+)"
            replacement = "$1:$2"
            target_label = "__address__"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scheme"]
            action = "replace"
            target_label = "__scheme__"
            regex = "(https?)"
            replacement = "$1"
          }
        }

        // Scrape kubelet /metrics
        prometheus.scrape "kubelet" {
          targets           = discovery.relabel.kubelet.output
          job_name          = "integrations/kubernetes/kubelet"
          scheme            = "https"
          metrics_path      = "/metrics"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          tls_config {
            ca_file        = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            insecure_skip_verify = true
          }
          forward_to = [prometheus.relabel.cloud_filter.receiver, prometheus.remote_write.mimir.receiver]
        }

        // Scrape cadvisor container metrics
        prometheus.scrape "cadvisor" {
          targets           = discovery.relabel.cadvisor.output
          job_name          = "integrations/kubernetes/cadvisor"
          scheme            = "https"
          metrics_path      = "/metrics/cadvisor"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          tls_config {
            ca_file        = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            insecure_skip_verify = true
          }
          forward_to = [prometheus.relabel.cloud_filter.receiver, prometheus.remote_write.mimir.receiver]
        }

        // Scrape node exporter
        prometheus.scrape "node_exporter" {
          targets = [{
            __address__ = "monitoring-prometheus-node-exporter.monitoring.svc.cluster.local:9100",
          }]
          job_name   = "node-exporter"
          forward_to = [prometheus.relabel.cloud_filter.receiver, prometheus.remote_write.mimir.receiver]
        }

        // Scrape pods with prometheus.io annotations
        prometheus.scrape "pods" {
          targets    = discovery.relabel.pod_annotations.output
          job_name   = "pod-metrics"
          forward_to = [prometheus.relabel.cloud_filter.receiver, prometheus.remote_write.mimir.receiver]
        }

        // Scrape ServiceMonitor targets
        prometheus.operator.servicemonitors "services" {
          forward_to = [prometheus.remote_write.mimir.receiver]
        }

        // Filter metrics before sending to Grafana Cloud
        prometheus.relabel "cloud_filter" {
          forward_to = [prometheus.remote_write.cloud.receiver]

          // Keep only PVC fullness metrics for Cloud
          rule {
            source_labels = ["__name__"]
            action = "keep"
            regex = "kubelet_volume_stats_available_bytes|kubelet_volume_stats_capacity_bytes|kubelet_volume_stats_used_bytes"
          }
        }

        // Remote write to Grafana Cloud
        prometheus.remote_write "cloud" {
          endpoint {
            url = env("PROMETHEUS_URL")
            basic_auth {
              username = env("GRAFANA_USER")
              password = env("TOKEN")
            }
          }
        }

        // Remote write to local Mimir
        prometheus.remote_write "mimir" {
          endpoint {
            url = "http://distributor.metrics-system.svc.cluster.local:8080/api/v1/push"
          }
        }

####################################################################################################
# Node Exporter
####################################################################################################

prometheus-node-exporter:
  enabled: true
  prometheus:
    monitor:
      enabled: true
