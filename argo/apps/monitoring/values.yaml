domain: REPLACE_ME
cluster_name: REPLACE_ME

####################################################################################################
# Alloy
####################################################################################################

alloy:
  enabled: true
  controller:
    type: statefulset # Needed for clustering
    replicas: 1
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    ingressClassName: internal-shared
    faroPort: 12345 # Fake faro so we have access to the UI
    extraPaths:
      - path: /faro
        pathType: Prefix
        backend:
          service:
            name: monitoring-alloy
            port:
              number: 12347
  # Add environment variables for remote config
  extraEnvs:
    - name: REMOTE_CONFIG_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: remote-config-url
    - name: TOKEN
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: token
    - name: PROMETHEUS_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: metrics-url
    - name: LOKI_URL
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: loki-url
    - name: GRAFANA_USER
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: user
    - name: LOKI_USER
      valueFrom:
        secretKeyRef:
          name: grafana-cloud
          key: loki-user
  alloy:
    clustering:
      enabled: false
    stabilityLevel: experimental
    configMap:
      content: |
        logging {
          level = "info"
          format = "json"
        }

        livedebugging {
          enabled = true
        }

        // Minimal local config - everything else managed remotely
        discovery.kubernetes "node" {
          role = "node"
        }


        // Minimal local config - everything else managed remotely
        // This ensures the agent can start and receive remote config
        discovery.kubernetes "node" {
          role = "node"
        }

####################################################################################################
# Node Exporter
####################################################################################################

prometheus-node-exporter:
  enabled: true
  prometheus:
    monitor:
      enabled: true
